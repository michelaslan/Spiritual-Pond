<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="book.js" defer></script>
</head>
<body>
    <a href="index.html" id="backArrow">←</a>

    <div id="container">
        <div id="bookImg-container"></div>
        <div id="bookInfo-container"></div>
        <div id="interaction-container">
            <div id="addToRead">
                <button id="addToReadBtn">⛊ Add to Read-List</button>
            </div>
            <div id="rating-section">
                <h2>Rate this book</h2>
                <p>Your rating</p>
                <div id="stars">
                    <div class="star-item"><span data-value="1">☆</span><small>1</small></div>
                    <div class="star-item"><span data-value="2">☆</span><small>2</small></div>
                    <div class="star-item"><span data-value="3">☆</span><small>3</small></div>
                    <div class="star-item"><span data-value="4">☆</span><small>4</small></div>
                    <div class="star-item"><span data-value="5">☆</span><small>5</small></div>
                    <div class="star-item"><span data-value="6">☆</span><small>6</small></div>
                    <div class="star-item"><span data-value="7">☆</span><small>7</small></div>
                    <div class="star-item"><span data-value="8">☆</span><small>8</small></div>
                    <div class="star-item"><span data-value="9">☆</span><small>9</small></div>
                    <div class="star-item"><span data-value="10">☆</span><small>10</small></div>
                </div>
            </div>
        </div>
    </div>
    <div id="text-container">
    </div>



</body>
</html>
